services:
  grafana-alloy:
    image: grafana/alloy:latest
    container_name: gpwk-alloy
    restart: unless-stopped

    # Mount configuration file
    volumes:
      - ./gpwk.alloy:/etc/alloy/config.alloy:ro

    # Expose ports
    ports:
      # OTLP receivers (for GPWK Python to send telemetry)
      - "4317:4317"  # gRPC
      - "4318:4318"  # HTTP
      # Alloy UI (for monitoring and debugging)
      - "12345:12345"

    # Grafana Cloud credentials
    environment:
      # OTLP configuration (for GPWK telemetry)
      - GRAFANA_CLOUD_OTLP_ENDPOINT=${GRAFANA_CLOUD_OTLP_ENDPOINT}
      - GRAFANA_CLOUD_OTLP_USERNAME=${GRAFANA_CLOUD_OTLP_USERNAME}
      # Prometheus configuration (for Alloy meta-monitoring)
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_PROMETHEUS_USERNAME=${GRAFANA_CLOUD_PROMETHEUS_USERNAME}
      # API Key (shared by both)
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}

    # Command to run Alloy with config
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network
    network_mode: bridge
